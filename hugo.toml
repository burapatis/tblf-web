# โดเมนจริงของโครงการ (ตามเอกสาร TBLF v0.4)
baseURL = 'https://tblf.thamdee.com/'
languageCode = 'th'
title = 'ภาวะผู้นำแบบไทยพอดี | Thai Balanced Leadership Framework (TBLF)'

# Rewrite root-relative links to absolute URLs under baseURL
canonifyURLs = true
enableEmoji = true

[permalinks]
  news = '/news/:year/:slug/'

[taxonomies]
  category = 'categories'
  tag = 'tags'

[params]
  description = 'ศูนย์กลางองค์ความรู้โครงการการวิจัยและพัฒนากรอบแนวคิดภาวะผู้นำแบบไทยพอดี (Thai Balanced Leadership Framework: TBLF) — กรอบแนวคิดภาวะผู้นำทางการบริหารการศึกษาที่บูรณาการหลักวิชาการสากลกับบริบทไทย'
  charter = 'Foundation Charter v1.0'

